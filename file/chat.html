<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <!-- Menghubungkan ke file CSS Anda yang ada di folder static -->
    <link rel="stylesheet" href="{{ url_for('static', filename='chat.css') }}">
</head>
<body>
    <div class="chat-container">
        <div class="chat-newchat">
            <button onclick="resetChat()" class="btn-reset">New Chat</button>
        </div>
        <div class="chat-header">
            <h2>AI Chatbot</h2>
        </div>
        <!-- Wadah Tempat Pesan Muncul -->
        <div id="chat-box" class="chat-box">
            <div class="message bot-message">
                <p>Halo! Ada yang bisa saya bantu hari ini?</p>
            </div>
        </div>
        <!-- Area Input Pengguna -->
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Ketik pesan Anda di sini..." onkeypress="handleEnter(event)">
            <button onclick="kirimPesan()" class="btn-send">Kirim</button>
        </div>
    </div>

    <script>
        // TAMBAHAN: Saat halaman chat pertama kali dimuat,
        // ambil pesan dari sessionStorage dan langsung kirim ke bot
        window.onload = function() {
            const pesanAwal = sessionStorage.getItem('pesanAwal');
            if (pesanAwal) {
                sessionStorage.removeItem('pesanAwal'); // Hapus agar tidak terkirim ulang saat refresh
                kirimPesanKe(pesanAwal);
            }
        };

        function kirimPesan() {
            const inputField = document.getElementById('user-input');
            const pesan = inputField.value.trim();
            if (pesan === "") return;
            inputField.value = "";
            kirimPesanKe(pesan);
        }

        // Fungsi inti pengiriman pesan — dipakai oleh kirimPesan() dan window.onload
        function kirimPesanKe(pesan) {
            const chatBox = document.getElementById('chat-box');

            chatBox.innerHTML += `
                <div class="message user-message">
                    <p>${pesan}</p>
                </div>
            `;
            chatBox.scrollTop = chatBox.scrollHeight;

            const typingId = "typing-" + Date.now();
            chatBox.innerHTML += `
                <div class="message bot-message" id="${typingId}">
                    <p><i>Gemini sedang mengetik...</i></p>
                </div>
            `;
            chatBox.scrollTop = chatBox.scrollHeight;

            fetch('/kirim_pesan', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 'pesan': pesan })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById(typingId).remove();
                chatBox.innerHTML += `
                    <div class="message bot-message">
                        <p>${data.jawaban}</p>
                    </div>
                `;
                chatBox.scrollTop = chatBox.scrollHeight;
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById(typingId).remove();
            });
        }

        function handleEnter(event) {
            if (event.key === 'Enter') {
                kirimPesan();
            }
        }

        function resetChat() {
            if (confirm("Apakah Anda yakin ingin menghapus seluruh riwayat obrolan?")) {
                fetch('/reset_chat', {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    alert(data.status);
                    window.location.href = '/'; // Kembali ke halaman utama setelah reset
                });
            }
        }

        // ============================================================
        // KODE BARU: Sinkronisasi percakapan ke localStorage (history)
        // ============================================================

        const HISTORY_KEY = 'chatHistoryList';

        function getAllHistory() {
            const raw = localStorage.getItem(HISTORY_KEY);
            return raw ? JSON.parse(raw) : [];
        }

        // Simpan pesan baru ke sesi aktif di localStorage
        function simpanPesanKeHistory(role, teks) {
            const sesiId = sessionStorage.getItem('aktivSesiId');
            if (!sesiId) return;

            let histories = getAllHistory();
            const idx = histories.findIndex(function(s) { return s.id === sesiId; });
            if (idx === -1) return;

            histories[idx].messages.push({ role: role, teks: teks });
            localStorage.setItem(HISTORY_KEY, JSON.stringify(histories));
        }

        // Muat percakapan lama ke chat-box jika dibuka dari sidebar history
        function muatHistoryKeChat() {
            const loadId = sessionStorage.getItem('loadHistoryId');
            if (!loadId) return;

            sessionStorage.removeItem('loadHistoryId');
            // Set sesi aktif ke sesi yang dimuat agar pesan baru tetap tersimpan
            sessionStorage.setItem('aktivSesiId', loadId);

            const histories = getAllHistory();
            const sesi = histories.find(function(s) { return s.id === loadId; });
            if (!sesi || !sesi.messages || sesi.messages.length === 0) return;

            const chatBox = document.getElementById('chat-box');
            // Kosongkan pesan sambutan default
            chatBox.innerHTML = '';

            sesi.messages.forEach(function(msg) {
                if (msg.role === 'user') {
                    chatBox.innerHTML += `<div class="message user-message"><p>${msg.teks}</p></div>`;
                } else {
                    chatBox.innerHTML += `<div class="message bot-message"><p>${msg.teks}</p></div>`;
                }
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Override kirimPesanKe untuk ikut menyimpan ke history
        const _kirimPesanKeAsli = kirimPesanKe;
        kirimPesanKe = function(pesan) {
            // Simpan pesan user ke history
            simpanPesanKeHistory('user', pesan);

            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `
                <div class="message user-message">
                    <p>${pesan}</p>
                </div>
            `;
            chatBox.scrollTop = chatBox.scrollHeight;

            const typingId = "typing-" + Date.now();
            chatBox.innerHTML += `
                <div class="message bot-message" id="${typingId}">
                    <p><i>Gemini sedang mengetik...</i></p>
                </div>
            `;
            chatBox.scrollTop = chatBox.scrollHeight;

            fetch('/kirim_pesan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 'pesan': pesan })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById(typingId).remove();
                chatBox.innerHTML += `
                    <div class="message bot-message">
                        <p>${data.jawaban}</p>
                    </div>
                `;
                chatBox.scrollTop = chatBox.scrollHeight;
                // Simpan jawaban bot ke history
                simpanPesanKeHistory('bot', data.jawaban);
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById(typingId).remove();
            });
        };

        // Jalankan pengecekan load history setelah halaman siap
        // (dijalankan setelah window.onload yang sudah ada, agar tidak bentrok)
        document.addEventListener('DOMContentLoaded', function() {
            // Jika ada loadHistoryId, muat dulu history sebelum window.onload kirim pesanAwal
            const loadId = sessionStorage.getItem('loadHistoryId');
            if (loadId) {
                // Hapus pesanAwal agar tidak dikirim ulang saat buka history
                sessionStorage.removeItem('pesanAwal');
                muatHistoryKeChat();
            }
        });

        // ============================================================
        // AKHIR KODE BARU
        // ============================================================
    </script>
</body>
</html>
